<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logg inn – Tripletex brukertest</title>
  <link rel="stylesheet" href="https://cdn.tripletex.no/google-fonts/rubik-400-500-800.css">
  <link rel="stylesheet" href="_system/tokens.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font: 14px/1.5 "Rubik", sans-serif;
      color: var(--text-primary);
      background: var(--surface-background);
    }

    .gate-wrap {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-24);
      background: var(--surface-background);
    }

    /* Back button */
    .back-btn {
      position: fixed;
      top: var(--space-20);
      left: var(--space-20);
      display: inline-flex;
      align-items: center;
      gap: var(--space-8);
      height: 40px;
      padding: 0 var(--space-16) 0 var(--space-12);
      background: var(--surface-info-hover);
      border: none;
      border-radius: var(--radius-default);
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-action);
      text-decoration: none;
      cursor: pointer;
    }
    .back-btn:hover { background: var(--surface-info-highlight); }
    .back-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

    /* Card */
    .gate-card {
      width: 100%;
      max-width: 440px;
      text-align: center;
    }

    .gate-title {
      font: 500 28px/1.2 "Rubik", sans-serif;
      color: var(--text-primary);
      margin-bottom: var(--space-16);
    }

    .gate-desc {
      font: 14px/1.6 "Rubik", sans-serif;
      color: var(--text-muted);
      margin-bottom: var(--space-24);
    }

    /* Input row */
    .gate-form {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-8);
      margin-bottom: var(--space-8);
    }

    .gate-input {
      width: 180px;
      height: 40px;
      padding: 0 var(--space-12);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-default);
      font: 14px/1 "Rubik", sans-serif;
      color: var(--text-primary);
      background: var(--surface-default);
      outline: none;
      text-align: center;
      letter-spacing: 0.08em;
    }
    .gate-input:focus { border-color: var(--action-primary-rest); }
    .gate-input.is-error { border-color: var(--surface-error-active); }

    .gate-submit {
      height: 40px;
      padding: 0 var(--space-20);
      background: var(--action-primary-rest);
      border: none;
      border-radius: var(--radius-default);
      font: 14px/1 "Rubik", sans-serif;
      color: var(--text-on-action);
      cursor: pointer;
    }
    .gate-submit:hover { background: var(--action-primary-hover); }

    .gate-error {
      font: 13px/1 "Rubik", sans-serif;
      color: var(--surface-error-active);
      min-height: 16px;
      margin-bottom: var(--space-32);
    }

    /* Logo */
    .gate-logo {
      display: flex;
      justify-content: center;
      margin-top: var(--space-40);
    }
  </style>
</head>
<body>

<a class="back-btn" href="index.html">
  <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  Alle prototyper
</a>

<script>
  // code → which destination groups it unlocks
  var ACCESS = {
    'antony': ['konsern', 'patterns'],
    'test':   ['components']
  };

  // destination group → regex that matches the target URL
  var GROUPS = {
    konsern:    /konsern/i,
    patterns:   /patterns/i,
    components: /Components/i
  };

  var params = new URLSearchParams(location.search);
  var dest   = params.get('to') || 'index.html';

  function groupFor(url) {
    for (var g in GROUPS) {
      if (GROUPS[g].test(url)) return g;
    }
    return null;
  }

  function tryLogin() {
    var code  = document.getElementById('codeInput').value.trim().toLowerCase();
    var input = document.getElementById('codeInput');
    var err   = document.getElementById('errorMsg');
    var group = groupFor(dest);
    var allowed = ACCESS[code] || [];

    if (allowed.indexOf(group) !== -1) {
      sessionStorage.setItem('tx-auth-' + group, code);
      location.href = dest;
    } else {
      input.classList.add('is-error');
      err.textContent = 'Feil kode. Prøv igjen.';
    }
  }

  document.getElementById('submitBtn').addEventListener('click', tryLogin);
  document.getElementById('codeInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryLogin();
    document.getElementById('codeInput').classList.remove('is-error');
    document.getElementById('errorMsg').textContent = '';
  });
</script>
