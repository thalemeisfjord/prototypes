  <style>
    .page-content {
      display: flex;
      flex-direction: column;
      gap: var(--space-24);
      padding: var(--space-32);
      max-width: 1080px;
    }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      font: 14px/1.4 "Rubik", sans-serif;
    }
    .breadcrumb-link {
      color: var(--text-action);
      text-decoration: none;
    }
    .breadcrumb-link:hover { text-decoration: underline; }
    .breadcrumb-sep { color: var(--text-primary); }
    .breadcrumb-current { color: var(--text-primary); }

    /* Page header */
    .page-header-row {
      display: flex;
      align-items: center;
      gap: var(--space-12);
      min-height: 40px;
    }
    .page-title {
      font: 400 30px/1.3 "Rubik", sans-serif;
      color: var(--text-primary);
      flex: 1;
    }

    /* Tabs */
    .tab-group {
      display: flex;
      align-items: flex-end;
      gap: var(--space-12);
      border-bottom: 1px solid var(--border-muted);
    }
    .tab {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      padding: 3px 2px;
      height: 40px;
      justify-content: flex-end;
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-primary);
      cursor: pointer;
      border: none;
      background: none;
      white-space: nowrap;
    }
    .tab-underline {
      height: 4px;
      width: 100%;
      border-radius: 2px 2px 0 0;
    }
    .tab--active .tab-underline { background: var(--action-primary-rest); }
    .tab--active { font-weight: 500; }

    /* Accordion */
    .accordion {
      background: var(--surface-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-default);
    }
    .accordion-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--space-12) var(--space-24);
      border-bottom: 1px solid var(--border-muted);
      cursor: pointer;
      user-select: none;
    }
    .accordion-header:hover { background: var(--surface-background); }
    .accordion-title {
      font: 500 16px/1.3 "Rubik", sans-serif;
      color: var(--text-primary);
      height: 40px;
      display: flex;
      align-items: center;
    }
    .accordion-chevron {
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      transition: transform 0.2s;
    }
    .accordion--collapsed .accordion-header { border-bottom: none; }
    .accordion--collapsed .accordion-chevron { transform: rotate(180deg); }
    .accordion--collapsed .accordion-body { display: none; }
    .accordion-body {
      padding: var(--space-24);
      display: flex;
      flex-direction: column;
      gap: var(--space-24);
    }

    /* Two-column form grid */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-24);
    }

    /* Form group */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: var(--space-8);
    }
    .form-label {
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-primary);
      display: flex;
      gap: var(--space-4);
    }
    .form-label-required { color: var(--text-primary); }
    .form-input,
    .form-select {
      height: 40px;
      padding: 10px var(--space-16);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-default);
      background: var(--surface-background);
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-primary);
      width: 100%;
      box-sizing: border-box;
    }
    .form-input::placeholder { color: var(--text-muted); }
    .form-input:focus,
    .form-select:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: 0 0 0 2px rgba(10,65,250,0.12);
    }
    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='20' height='20' viewBox='0 0 20 20' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M5 7.5L10 12.5L15 7.5' stroke='%23818794' stroke-width='1.3' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 36px;
      cursor: pointer;
    }

    /* Toggle */
    .toggle-row {
      display: flex;
      align-items: center;
      gap: var(--space-8);
    }
    .toggle {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border-muted);
      border-radius: 9999px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle-slider::before {
      content: "";
      position: absolute;
      width: 12px;
      height: 12px;
      left: 4px;
      top: 4px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .toggle-slider { background: var(--action-primary-rest); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .toggle-label {
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-primary);
    }
    .toggle-help {
      width: 20px;
      height: 20px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Section subheading */
    .form-section-title {
      font: 400 16px/1.3 "Rubik", sans-serif;
      color: var(--text-primary);
    }

    /* Divider */
    .form-divider {
      border: none;
      border-top: 1px solid var(--border-muted);
      margin: 0;
    }

    /* Toggle group box */
    .toggle-group-box {
      background: var(--surface-background);
      border-radius: var(--radius-default);
      padding: var(--space-12);
      display: flex;
      gap: var(--space-24);
    }

    /* Kebab dropdown */
    .kebab-wrap {
      position: relative;
    }
    .kebab-menu {
      position: absolute;
      top: calc(100% + 4px);
      right: 0;
      background: var(--surface-default);
      border: 1px solid var(--border-muted);
      border-radius: var(--radius-default);
      box-shadow: 0 4px 16px rgba(46,56,77,0.12);
      z-index: 100;
      min-width: 180px;
      padding: var(--space-4) 0;
      display: none;
    }
    .kebab-menu.is-open { display: block; }
    .kebab-menu-item {
      display: flex;
      align-items: center;
      gap: var(--space-8);
      width: 100%;
      padding: var(--space-8) var(--space-16);
      font: 14px/1.4 "Rubik", sans-serif;
      color: var(--text-primary);
      background: none;
      border: none;
      cursor: pointer;
      text-align: left;
      white-space: nowrap;
    }
    .kebab-menu-item:hover { background: var(--surface-info-rest); }
    .kebab-menu-item svg { width: 16px; height: 16px; flex-shrink: 0; color: var(--text-muted); }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(46, 56, 77, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 500;
    }
    .modal-overlay[hidden] { display: none; }
    .modal-card {
      background: var(--surface-default);
      border-radius: var(--radius-default);
      padding: var(--space-32);
      width: 400px;
      max-width: calc(100vw - var(--space-32));
      position: relative;
      display: flex;
      flex-direction: column;
      gap: var(--space-24);
      box-shadow: 0 10px 40px rgba(15, 41, 127, 0.2);
    }
    .modal-close {
      position: absolute;
      top: var(--space-8);
      right: var(--space-8);
      width: var(--size-medium);
      height: var(--size-medium);
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      border-radius: var(--radius-default);
      cursor: pointer;
      color: var(--text-muted);
    }
    .modal-close:hover { background: var(--action-neutral-hover); }
    .modal-close svg { width: 20px; height: 20px; }
    .modal-header { display: flex; flex-direction: column; gap: var(--space-4); }
    .modal-title { font: 500 20px/1.3 "Rubik", sans-serif; color: var(--text-primary); }
    .modal-body { font: 14px/1.4 "Rubik", sans-serif; color: var(--text-primary); }
    .modal-footer { display: flex; gap: var(--space-8); }
    </style>
</head>

<script>
  // Kebab menu
  function toggleKebab(e) {
    e.stopPropagation();
    document.getElementById('kebabMenu').classList.toggle('is-open');
  }
  document.addEventListener('click', () => {
    document.getElementById('kebabMenu').classList.remove('is-open');
  });

  // Fill with demo data
  function fillDemoData() {
    document.getElementById('kebabMenu').classList.remove('is-open');
    const set = (sel, val) => { const el = document.querySelector(sel); if (el) el.value = val; };
    set('select:nth-of-type(1)', 'Datterselskap');
    set('input[type="text"]:nth-of-type(1)', 'Selskap A AS');
    set('input[type="text"]:nth-of-type(2)', '987654321');
    set('input[type="text"]:nth-of-type(3)', '10042');
    set('select:nth-of-type(2)', 'Norsk');
    set('input[type="text"]:nth-of-type(4)', 'NOK');
    set('input[type="text"]:nth-of-type(5)', 'Kari Nordmann');
    set('input[type="text"]:nth-of-type(6)', '1500');
    set('input[type="tel"]:nth-of-type(1)', '+47 22 00 00 00');
    set('input[type="tel"]:nth-of-type(2)', '+47 900 00 000');
    set('input[type="email"]', 'post@selskapA.no');
    set('input[type="url"]', 'www.selskapA.no');
    // Address fields
    const texts = document.querySelectorAll('input[type="text"]');
    if (texts[6]) texts[6].value = 'Storgata 1';
    if (texts[7]) texts[7].value = '0155';
    if (texts[8]) texts[8].value = '0155';
    if (texts[9]) texts[9].value = 'Oslo';
  }

  // Modal
  function openModal() {
    document.getElementById('modalOverlay').removeAttribute('hidden');
  }
  function closeModal() {
    document.getElementById('modalOverlay').setAttribute('hidden', '');
  }
  function handleOverlayClick(e) {
    if (e.target === e.currentTarget) closeModal();
  }

  // Accordion toggle
  function toggleAccordion(id) {
    document.getElementById(id).classList.toggle('accordion--collapsed');
  }
</script>
